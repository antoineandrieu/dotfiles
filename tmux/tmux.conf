##### Core #####
set -sg escape-time 50
set -g default-terminal "tmux-256color"
set -g xterm-keys on
set -g mouse on
setw -g mode-keys vi

# Extended keyboard protocol (kitty & xterm)
set -g terminal-features "alacritty:RGB,xterm-256color:RGB"

# Enable focus events (disabled - conflicts with Claude Code focus behavior)
# set -g focus-events on

##### Prefix #####
set -g prefix C-Space
bind Space send-prefix

##### Status / Theme #####
# Dracula palette only:
# background #282a36, current line #44475a, foreground #f8f8f2,
# comment #6272a4, cyan #8be9fd, green #50fa7b, orange #ffb86c,
# pink #ff79c6, purple #bd93f9, red #ff5555, yellow #f1fa8c.
set -g status on
set -g status-interval 2
set -g status-position bottom
set -g status-style "fg=#f8f8f2,bg=#bd93f9"
set -g status-left-length 80
set -g status-right-length 120
set -g status-left "#($HOME/.tmux-ssh-status.py #{pane_pid} #{host_short})"
set -g status-right "#[fg=#44475a,bg=#bd93f9]#[fg=#f8f8f2,bg=#44475a] #{=32:pane_current_path} #[fg=#6272a4,bg=#44475a]#[fg=#f8f8f2,bg=#6272a4,bold] %H:%M #[fg=#f8f8f2,bg=#6272a4,nobold]"
set -g window-status-separator ""
set -g window-status-format "#[bg=#bd93f9]"
set -g window-status-current-format "#[bg=#bd93f9]"
set -g pane-border-style "fg=#44475a"
set -g pane-active-border-style "fg=#bd93f9"
set -g message-style "fg=#f8f8f2,bg=#44475a"
set -g mode-style "fg=#282a36,bg=#ffb86c,bold"
if-shell "test -f ~/.tmuxline" "source ~/.tmuxline"

##### Clipboard: macOS/Linux #####
# Detect OS and set clipboard command
if-shell "command -v pbcopy >/dev/null 2>&1" 'set -g @clipboard-command "pbcopy"'
if-shell "command -v xclip >/dev/null 2>&1" 'set -g @clipboard-command "xclip -selection clipboard"'
# Clipboard bindings (works with both pbcopy and xclip via tmux-yank or manually)
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy 2>/dev/null || xclip -selection clipboard"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy 2>/dev/null || xclip -selection clipboard"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy 2>/dev/null || xclip -selection clipboard"
set -g set-clipboard on

# Left click selects pane, allows terminal apps to receive clicks
bind -T root MouseDown1Pane select-pane -t = \; send-keys -M

##### Vim-aware pane navigation (expects Ctrl-h/j/k/l) #####
# Ctrl+hjkl always navigate between panes (don't send to apps)
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Same keys in copy-mode-vi
bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R

##### Window / Pane management #####
bind -n C-o split-window -h -c "#{pane_current_path}"
bind -n C-e split-window -v -c "#{pane_current_path}"
bind -n C-x resize-pane -Z
bind -n C-q kill-pane
bind -n C-t new-window
bind -n F2 command-prompt -I "#W" "rename-window '%%'"

##### Window switching #####
bind -n M-Right select-window -n
bind -n M-Left  select-window -p

##### Utilities #####
bind -n C-u send-keys "clear" \; send-keys "Enter" \; clear-history
bind r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"

##### Plugins #####
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
run '~/.tmux/plugins/tpm/tpm'
